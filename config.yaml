# Local WhatsApp fine-tuning dataset (multi-turn chat JSON)
dataset_path: "./whatsapp_training_data.json"

# Hugging Face base model
model_name: "microsoft/Phi-3-mini-4k-instruct"

# LoRA / QLoRA
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

# Training
training:
  output_dir: "./outputs/zorent-whatsapp-lora"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  max_seq_length: 2048
  logging_steps: 10
  save_steps: 500
  warmup_ratio: 0.03
  bf16: true
  load_in_4bit: true
  train_split: 0.95
